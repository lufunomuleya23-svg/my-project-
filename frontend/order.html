<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Order</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f8f8f8;
    padding-top: 60px;
}

.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: #2a5298;
    color: white;
    padding: 15px;
}

.card {
    background: white;
    width: 300px;
    margin: 80px auto 20px;
    padding: 20px;
    border-radius: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
}

.map-info {
    background: white;
    width: 300px;
    margin: auto;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">Azure Plate Order</div>

<h1>Your Order</h1>

<div class="card" id="orderBox"></div>

<div class="map-info" id="deliveryBox"></div>

<button onclick="addToCart('orderbox')">Add to cart</button>
<a href="cart.html">
    <button>View Cart</button>
</a>
<script>
// ORDER ITEM
let item = JSON.parse(localStorage.getItem("orderItem"));

if (item) {
    document.getElementById("orderBox").innerHTML = `
        <img src="${item.image}">
        <h2>${item.name}</h2>
        <h3>Price: R${item.price}</h3>
    `;
}

// DELIVERY LOCATION
let locationData = JSON.parse(localStorage.getItem("deliveryLocation"));

if (locationData) {
    document.getElementById("deliveryBox").innerHTML = `
        <h3>Delivery Location</h3>
        <p><b>Address:</b> ${locationData.name}</p>
    `;
} else {
    document.getElementById("deliveryBox").innerHTML =
        "<p>No location selected</p>";
}

function addToCart(image, name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
        image: item.image,
        name: item.name,
        price: item.price
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Added to cart!");
    window.location.href = "cart.html";
}
</script>

</body>
</html>
