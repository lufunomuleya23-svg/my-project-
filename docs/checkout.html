<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

.cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.cart-item img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
}

.total {
    font-size: 20px;
    font-weight: bold;
    text-align: right;
    margin-top: 15px;
}

.address-box {
    margin-top: 20px;
    padding: 15px;
    background: #f0f0f0;
    border-radius: 8px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}
</style>
</head>

<body>

<div class="container">

    <h2>Checkout 🧾</h2>

    <!-- CART -->
    <div id="cart"></div>

    <div class="total" id="total"></div>

    <!-- ADDRESS -->
    <div class="address-box" id="addressBox"></div>

    <!-- CUSTOMER INFO -->
    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <button onclick="placeOrder()">Place Order</button>

</div>

<script>

// LOAD DATA
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let locationData = JSON.parse(localStorage.getItem("deliveryLocation"));

const cartDiv = document.getElementById("cart");
const totalDiv = document.getElementById("total");
const addressBox = document.getElementById("addressBox");

let total = 0;

// SHOW CART
function renderCheckout() {

    cartDiv.innerHTML = "";
    total = 0;

    if (cart.length === 0) {
        cartDiv.innerHTML = "<p>Your cart is empty 😢</p>";
    } else {

        cart.forEach(item => {

            total += Number(item.price);

            cartDiv.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}">
                    <span>${item.name}</span>
                    <span>R${item.price}</span>
                </div>
            `;
        });

        totalDiv.innerText = "Total: R" + total;
    }

    // ADDRESS DISPLAY
    if (locationData) {
        addressBox.innerHTML = `
            <h3>Delivery Address 📍</h3>
            <p>${locationData.name}</p>
        `;
    } else {
        addressBox.innerHTML = `
            <h3>Delivery Address 📍</h3>
            <p style="color:red;">No delivery location selected</p>
        `;
    }
}

renderCheckout();

// PLACE ORDER
function placeOrder() {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    if (!name || !phone) {
        alert("Please fill in your details");
        return;
    }

    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    if (!locationData) {
        alert("No delivery location selected");
        return;
    }

    const orderData = {
        customerName: name,
        phone: phone,
        items: cart,
        total: total,
        address: locationData
    };

    fetch("http://localhost:3000/order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(orderData)
    })
    .then(res => res.json())
    .then(data => {

        alert("Order placed successfully!");

        // clear cart
        localStorage.removeItem("cart");

        window.location.href = "success.html";
    })
    .catch(err => {
        console.error(err);
        alert("Failed to place order");
    });
}

</script>

</body>
</html>
