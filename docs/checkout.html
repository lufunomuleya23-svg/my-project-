<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .label {
      font-size: 14px;
      margin-top: 10px;
      color: #444;
    }

    .address {
      background: #eee;
      padding: 10px;
      border-radius: 8px;
      margin-top: 5px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: black;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .note {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Checkout</h2>

  <div class="label">Delivery Address</div>
  <div id="addressBox" class="address">Loading...</div>

  <div class="label">Name</div>
  <input type="text" id="name" placeholder="Enter your name">

  <div class="label">Phone</div>
  <input type="text" id="phone" placeholder="Enter your phone">

  <button onclick="placeOrder()">Place Order</button>

  <div class="note">Secure checkout • No payment required</div>

</div>

<script>
  // GET address from cart/map
  let address = localStorage.getItem("deliveryAddress");

  // REMOVE lat/lng if they exist
  if (address && address.includes("-")) {
    address = address.split("-")[0].trim();
  }

  // SHOW address
  const addressBox = document.getElementById("addressBox");

  if (address && address !== "null") {
    addressBox.innerText = address;
  } else {
    addressBox.innerText = "No address selected ❌";
  }

  function placeOrder() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    if (!name || !phone) {
      alert("Please fill in all details");
      return;
    }

    if (!address) {
      alert("No address selected");
      return;
    }

    // save order (optional)
    const order = { name, phone, address };
    localStorage.setItem("lastOrder", JSON.stringify(order));

    // go success page
    window.location.href = "success.html";
  }
</script>

</body>
</html>
