<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ece9e6, #ffffff);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 380px;
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .label {
      font-size: 14px;
      margin-top: 10px;
      color: #444;
    }

    .address {
      background: #f3f3f3;
      padding: 10px;
      border-radius: 8px;
      margin-top: 5px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: #000;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #333;
    }

    .note {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Checkout</h2>

  <div class="label">Delivery Address</div>
  <div id="addressBox" class="address">Loading...</div>

  <div class="label">Name</div>
  <input type="text" id="name" placeholder="Enter your name">

  <div class="label">Phone</div>
  <input type="text" id="phone" placeholder="Enter your phone">

  <button onclick="placeOrder()">Place Order</button>

  <div class="note">Secure checkout • No payment required for demo</div>

</div>

<script>
  const address = localStorage.getItem("deliveryLocation");
  const addressBox = document.getElementById("addressBox");

  if (address && address !== "null") {
    addressBox.innerText = address;
  } else {
    addressBox.innerText = "No address selected ❌";
  }

  function placeOrder() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    if (!name || !phone) {
      alert("Please fill in all details");
      return;
    }

    if (!address || address === "null") {
      alert("Please select a location on the map");
      return;
    }

    const order = { name, phone, address };
    localStorage.setItem("lastOrder", JSON.stringify(order));

    window.location.href = "success.html";
  }
</script>

</body>
</html>
