<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .box {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="box">

  <h2>Checkout</h2>

  <p><strong>Delivery Address:</strong></p>
  <p id="addressBox">Loading address...</p>

  <p><strong>Customer Name:</strong></p>
  <input type="text" id="name" placeholder="Enter your name" required>

  <p><strong>Phone Number:</strong></p>
  <input type="text" id="phone" placeholder="Enter your phone" required>

  <button onclick="placeOrder()">Place Order</button>

</div>

<script>
  // Get address from map (localStorage)
  const address = localStorage.getItem("deliveryAddress");

  const addressBox = document.getElementById("addressBox");

  if (address) {
    addressBox.innerText = address;
  } else {
    addressBox.innerText = "No address selected";
  }

  function placeOrder() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    // validation
    if (!name || !phone) {
      alert("Please fill in your details");
      return;
    }

    if (!address) {
      alert("Please select a location on the map first");
      return;
    }

    // OPTIONAL: save order (frontend only)
    const order = {
      name: name,
      phone: phone,
      address: address
    };

    localStorage.setItem("lastOrder", JSON.stringify(order));

    // go to success page
    window.location.href = "success.html";
  }
</script>

</body>
</html>
