<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>

  <style>
    body {
      font-size: 16px;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 90%
      max-width: 420px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .label {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }

    .box {
      background: #eee;
      padding: 10px;
      border-radius: 8px;
      margin-top: 5px;
      font-size: 14px;
      word-wrap: break-word;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: black;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .note {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Checkout</h2>

  <div class="label">Delivery Address</div>
  <div id="addressBox" class="box">Loading...</div>

  <div class="label">Name</div>
  <input type="text" id="name" placeholder="Enter your name">

  <div class="label">Phone</div>
  <input type="text" id="phone" placeholder="Enter your phone">

  <button onclick="placeOrder()">Place Order</button>

  <div class="note">No backend required • Demo checkout</div>

</div>

<script>
  // GET address safely
  let address = localStorage.getItem("deliveryLocation");

  // CLEAN wrong formats (lat/lng or empty)
  if (address) {
    if (address.includes(",") && address.split(",").length === 2) {
      // could be lat/lng → check if numbers
      const parts = address.split(",");
      if (!isNaN(parts[0]) && !isNaN(parts[1])) {
        address = null;
      }
    }
  }

  const addressBox = document.getElementById("addressBox");

  if (!address || address === "null" || address === "") {
    addressBox.innerText = "No address selected ❌";
  } else {
    addressBox.innerText = address;
  }

  function placeOrder() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    if (!name || !phone) {
      alert("Please fill in all details");
      return;
    }

    if (!address) {
      alert("No address selected from map");
      return;
    }

    // save order (optional)
    localStorage.setItem("lastOrder", JSON.stringify({
      name,
      phone,
      address
    }));

    window.location.href = "success.html";
  }
</script>

</body>
</html>
